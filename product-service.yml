server:
  port: 8082
spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://mysql:3306/ecommerce
    username: vinod
    password: vinod
  data:
    redis:
      host: redis
      port: 6379
      timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 5000
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

resilience4j:
  circuitbreaker:
    instances:
      productService:

        sliding-window-size: 10

        minimum-number-of-calls: 5

        failure-rate-threshold: 50

        wait-duration-in-open-state: 10s

        permitted-number-of-calls-in-half-open-state: 2
