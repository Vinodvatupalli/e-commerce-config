server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://product-service:3306/test
    username: vinod
    password: vinod
  data:
    redis:
      host: redis
      port: 6379
      timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
