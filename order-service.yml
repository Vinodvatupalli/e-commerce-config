server:
  port: 8084

spring:
  application:
    name: order-service
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 5000
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
