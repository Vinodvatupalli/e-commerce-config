server:
  port: 8084

spring:
  application:
    name: order-service
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 5000
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
resilience4j:
  circuitbreaker:
    instances:
      productService:

        sliding-window-size: 10

        minimum-number-of-calls: 5

        failure-rate-threshold: 50

        wait-duration-in-open-state: 10s

        permitted-number-of-calls-in-half-open-state: 2
    resilience4j:
  retry:
    instances:
      productRetry:
        max-attempts: 3
        wait-duration: 2s 
