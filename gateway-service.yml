spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/placeorder/**

server:
  port: 8009

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
